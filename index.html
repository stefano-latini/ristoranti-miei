<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#fafafa" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0f0f10" media="(prefers-color-scheme: dark)" />
  <meta name="color-scheme" content="light dark" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="I miei locali" />
  <title>I miei locali</title>

  <!-- Favicon & Apple touch icon: minimal crossed cutlery -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%231a1a1a'/><g stroke='%23f0ede6' stroke-width='3' stroke-linecap='round' stroke-linejoin='round' fill='none'><path d='M22 14 L22 50'/><path d='M18 14 L18 26 Q18 30 22 30 Q26 30 26 26 L26 14'/><path d='M42 14 Q36 14 36 22 Q36 30 42 30 L42 50'/></g></svg>" />
  <link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%231a1a1a'/><g stroke='%23f0ede6' stroke-width='8' stroke-linecap='round' stroke-linejoin='round' fill='none'><path d='M62 40 L62 140'/><path d='M51 40 L51 74 Q51 84 62 84 Q73 84 73 74 L73 40'/><path d='M118 40 Q101 40 101 62 Q101 84 118 84 L118 140'/></g></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;0,900;1,400;1,700&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #fafafa;
      --bg-translucent: rgba(250,250,250,0.92);
      --surface: #fff;
      --surface-alt: #f8f8f8;
      --text: #1a1a1a;
      --text-muted: #666;
      --text-faint: #999;
      --text-ghost: #aaa;
      --text-light: #bbb;
      --text-lighter: #ccc;
      --border: #eee;
      --border-strong: #e4e4e4;
      --border-soft: #f2f2f2;
      --border-faint: #f5f5f5;
      --border-ghost: #f0f0f0;
      --pill-bg: #f5f5f5;
      --pill-bg-2: #f0f0f0;
      --accent: #1a1a1a;
      --accent-inverse: #fff;
      --danger: #c44;
      --danger-bg: #fef5f5;
      --danger-border: #f0d5d5;
      --shadow: 0 8px 32px rgba(0,0,0,0.08);
    }
    [data-theme="dark"] {
      --bg: #0f0f10;
      --bg-translucent: rgba(15,15,16,0.92);
      --surface: #1a1a1c;
      --surface-alt: #202023;
      --text: #f0ede6;
      --text-muted: #b8b3a8;
      --text-faint: #85807a;
      --text-ghost: #706b66;
      --text-light: #5c5854;
      --text-lighter: #4a4743;
      --border: #2a2a2d;
      --border-strong: #333336;
      --border-soft: #252528;
      --border-faint: #222225;
      --border-ghost: #252528;
      --pill-bg: #252528;
      --pill-bg-2: #2a2a2d;
      --accent: #f0ede6;
      --accent-inverse: #0f0f10;
      --danger: #e67373;
      --danger-bg: #2a1818;
      --danger-border: #4a2828;
      --shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    html, body { background: var(--bg); }
    body {
      font-family: 'Instrument Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      transition: background-color 0.25s, color 0.25s;
    }
    input, textarea, button { font-family: inherit; }
    input, textarea { box-sizing: border-box; max-width: 100%; }
    input[type="date"] { -webkit-appearance: none; appearance: none; }
    input::placeholder, textarea::placeholder { color: var(--text-lighter); }
    input[type="date"]::-webkit-calendar-picker-indicator {
      filter: var(--date-icon-filter, none);
    }
    [data-theme="dark"] input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(1);
    }
    .card-item { transition: background 0.1s; }
    @media (hover: hover) { .card-item:hover { background: var(--surface-alt) !important; } }
  </style>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    const { useState, useEffect, useCallback, useRef } = React;

    const CATEGORIES = [
      { key: "location", label: "Location" },
      { key: "menu", label: "Menu" },
      { key: "servizio", label: "Servizio" },
      { key: "conto", label: "Conto" },
    ];

    const TIPOLOGIE = [
      { key: "pranzo_cena", label: "Pranzo / Cena" },
      { key: "colazione", label: "Colazione" },
      { key: "aperitivo", label: "Aperitivo" },
    ];

    const STORAGE_KEY = "ristoranti_reviews";

    const ScoreInput = ({ value, onChange }) => {
      const editable = !!onChange;
      return (
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          {editable && (
            <input
              type="range"
              min={0}
              max={10}
              step={1}
              value={value}
              onChange={(e) => onChange(Number(e.target.value))}
              style={{
                width: 120,
                height: 4,
                accentColor: "var(--accent)",
                cursor: "pointer",
              }}
            />
          )}
          <span style={{
            fontFamily: "'Instrument Sans', sans-serif",
            fontWeight: 700,
            fontSize: 20,
            color: "var(--text)",
            minWidth: 28,
            textAlign: "right",
            lineHeight: 1,
          }}>
            {value}
          </span>
        </div>
      );
    };

    const Pill = ({ label, selected, onClick }) => (
      <button
        type="button"
        onClick={onClick}
        style={{
          padding: "7px 16px",
          borderRadius: 99,
          border: `1.5px solid ${selected ? "var(--accent)" : "var(--border-strong)"}`,
          background: selected ? "var(--accent)" : "transparent",
          color: selected ? "var(--accent-inverse)" : "var(--text-faint)",
          fontFamily: "'Instrument Sans', sans-serif",
          fontSize: 13,
          fontWeight: 500,
          cursor: "pointer",
          transition: "all 0.15s",
          WebkitTapHighlightColor: "transparent",
          whiteSpace: "nowrap",
        }}
      >
        {label}
      </button>
    );

    function App() {
      const [reviews, setReviews] = useState([]);
      const [view, setView] = useState("list");
      const [detail, setDetail] = useState(null);
      const [filter, setFilter] = useState("pranzo_cena");
      const [search, setSearch] = useState("");
      const [sort, setSort] = useState("date");
      const [loaded, setLoaded] = useState(false);
      const [menuOpen, setMenuOpen] = useState(false);
      const [editingId, setEditingId] = useState(null);
      const [theme, setTheme] = useState(() => {
        try {
          return localStorage.getItem("ristoranti_theme") || "auto";
        } catch (e) { return "auto"; }
      });
      const fileInputRef = useRef(null);

      // Resolve actual theme (auto → system preference) and apply it
      useEffect(() => {
        const mql = window.matchMedia("(prefers-color-scheme: dark)");
        const applyTheme = () => {
          const resolved = theme === "auto" ? (mql.matches ? "dark" : "light") : theme;
          document.documentElement.setAttribute("data-theme", resolved);
          // Update theme-color dynamically for manual override;
          // for "auto" we let the media-query meta tags handle it
          if (theme !== "auto") {
            let meta = document.querySelector('meta[name="theme-color"]:not([media])');
            if (!meta) {
              meta = document.createElement("meta");
              meta.setAttribute("name", "theme-color");
              document.head.appendChild(meta);
            }
            meta.setAttribute("content", resolved === "dark" ? "#0f0f10" : "#fafafa");
          } else {
            const extra = document.querySelector('meta[name="theme-color"]:not([media])');
            if (extra) extra.remove();
          }
        };
        applyTheme();
        if (theme === "auto") {
          mql.addEventListener("change", applyTheme);
          return () => mql.removeEventListener("change", applyTheme);
        }
        try { localStorage.setItem("ristoranti_theme", theme); } catch (e) {}
      }, [theme]);

      // Form state
      const [fn, setFn] = useState("");
      const [fcomune, setFcomune] = useState("");
      const [ft, setFt] = useState(null);
      const [fr, setFr] = useState({ location: 0, menu: 0, servizio: 0, conto: 0 });
      const [fnote, setFnote] = useState("");
      const [fdate, setFdate] = useState("");
      const [err, setErr] = useState("");

      useEffect(() => {
        window.scrollTo(0, 0);
      }, [view, detail]);

      useEffect(() => {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (raw) setReviews(JSON.parse(raw));
        } catch (e) {}
        setLoaded(true);
      }, []);

      const save = useCallback((data) => {
        setReviews(data);
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch (e) {}
      }, []);

      const avg = (r) => {
        const v = CATEGORIES.map((c) => r.ratings[c.key]);
        return v.length ? v.reduce((a, b) => a + b, 0) / v.length : 0;
      };

      const todayISO = () => {
        const d = new Date();
        const pad = (n) => String(n).padStart(2, "0");
        return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
      };

      const toDateInput = (iso) => {
        if (!iso) return todayISO();
        const d = new Date(iso);
        if (isNaN(d.getTime())) return todayISO();
        const pad = (n) => String(n).padStart(2, "0");
        return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
      };

      const reset = () => {
        setFn(""); setFcomune(""); setFt(null);
        setFr({ location: 0, menu: 0, servizio: 0, conto: 0 });
        setFnote(""); setFdate(todayISO()); setErr(""); setEditingId(null);
      };

      const startEdit = (r) => {
        setEditingId(r.id);
        setFn(r.name);
        setFcomune(r.comune || "");
        setFt(r.tipologia);
        setFr({ ...r.ratings });
        setFnote(r.note || "");
        setFdate(toDateInput(r.date));
        setErr("");
        setView("add");
      };

      const submit = () => {
        if (!fn.trim()) return setErr("Inserisci il nome del locale");
        if (!ft) return setErr("Seleziona una tipologia");
        if (Object.values(fr).some((v) => v == null)) return setErr("Dai un voto a tutte le categorie");
        if (!fdate) return setErr("Inserisci la data della visita");

        // Convert YYYY-MM-DD to ISO, preserve original time if editing same day
        const dateISO = new Date(fdate + "T12:00:00").toISOString();

        if (editingId) {
          const updated = reviews.map((r) => r.id === editingId
            ? { ...r, name: fn.trim(), comune: fcomune.trim(), tipologia: ft, ratings: { ...fr }, note: fnote.trim(), date: dateISO }
            : r);
          save(updated);
          const updatedItem = updated.find((r) => r.id === editingId);
          if (detail && detail.id === editingId) setDetail(updatedItem);
        } else {
          const item = {
            id: Date.now().toString(),
            name: fn.trim(),
            comune: fcomune.trim(),
            tipologia: ft,
            ratings: { ...fr },
            note: fnote.trim(),
            date: dateISO,
          };
          save([item, ...reviews]);
        }
        reset();
        setView(editingId ? "detail" : "list");
      };

      const del = (id) => {
        save(reviews.filter((r) => r.id !== id));
        if (detail && detail.id === id) { setDetail(null); setView("list"); }
      };

      // Export
      const handleExport = () => {
        setMenuOpen(false);
        const data = JSON.stringify(reviews, null, 2);
        const blob = new Blob([data], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        const today = new Date().toISOString().split("T")[0];
        a.download = `locali-${today}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      };

      // Import
      const handleImportClick = () => {
        setMenuOpen(false);
        fileInputRef.current?.click();
      };

      const handleImportFile = (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const imported = JSON.parse(ev.target.result);
            if (!Array.isArray(imported)) throw new Error();
            const choice = confirm(
              `Trovate ${imported.length} recensioni nel file.\n\n` +
              `OK = unisci con quelle attuali\n` +
              `Annulla = sostituisci tutto`
            );
            if (choice) {
              // Merge, avoid duplicates by id
              const existingIds = new Set(reviews.map((r) => r.id));
              const newOnes = imported.filter((r) => !existingIds.has(r.id));
              save([...newOnes, ...reviews]);
              alert(`Importate ${newOnes.length} nuove recensioni.`);
            } else {
              save(imported);
              alert(`Importate ${imported.length} recensioni.`);
            }
          } catch (err) {
            alert("File non valido. Deve essere un file JSON esportato da questa app.");
          }
        };
        reader.readAsText(file);
        e.target.value = "";
      };

      const filtered = reviews
        .filter((r) => !filter || r.tipologia === filter)
        .filter((r) => !search || r.name.toLowerCase().includes(search.toLowerCase()) || (r.comune || "").toLowerCase().includes(search.toLowerCase()))
        .sort((a, b) => sort === "rating" ? avg(b) - avg(a) : new Date(b.date) - new Date(a.date));

      const tipLabel = (k) => {
        const t = TIPOLOGIE.find((x) => x.key === k);
        return t ? t.label : "";
      };

      if (!loaded) return (
        <div style={{ display: "flex", justifyContent: "center", alignItems: "center", height: "100vh", fontFamily: "'Instrument Sans', sans-serif", color: "var(--text-light)", fontSize: 14 }}>
          Caricamento…
        </div>
      );

      const lbl = {
        display: "block",
        fontSize: 11,
        fontWeight: 600,
        color: "var(--text-ghost)",
        textTransform: "uppercase",
        letterSpacing: 0.8,
        marginBottom: 8,
      };

      // Rounded pill-style input
      const inp = {
        width: "100%",
        padding: "12px 20px",
        borderRadius: 99,
        border: "1.5px solid var(--border-strong)",
        background: "var(--surface)",
        fontSize: 15,
        color: "var(--text)",
        outline: "none",
        transition: "border-color 0.15s",
        fontFamily: "'Instrument Sans', sans-serif",
      };

      // Textarea needs softer corners but still rounded generously
      const textareaStyle = {
        width: "100%",
        padding: "14px 20px",
        borderRadius: 22,
        border: "1.5px solid var(--border-strong)",
        background: "var(--surface)",
        fontSize: 15,
        color: "var(--text)",
        outline: "none",
        transition: "border-color 0.15s",
        fontFamily: "'Instrument Sans', sans-serif",
        resize: "vertical",
        lineHeight: 1.5,
      };

      return (
        <div style={{
          maxWidth: 430,
          margin: "0 auto",
          minHeight: "100vh",
          background: "var(--bg)",
          fontFamily: "'Instrument Sans', sans-serif",
          color: "var(--text)",
          position: "relative",
        }}>
          {/* Hidden file input for import */}
          <input
            ref={fileInputRef}
            type="file"
            accept="application/json,.json"
            onChange={handleImportFile}
            style={{ display: "none" }}
          />

          {/* Header */}
          <div style={{
            padding: "20px 20px 14px",
            background: "var(--bg-translucent)",
            backdropFilter: "blur(12px)",
            WebkitBackdropFilter: "blur(12px)",
            position: "sticky", top: 0, zIndex: 10,
            borderBottom: "1px solid var(--border)",
          }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              {view === "list" ? (
                <>
                  <div>
                    <h1 style={{
                      fontFamily: "'Playfair Display', serif",
                      fontSize: 36, fontWeight: 800, letterSpacing: -0.5, lineHeight: 1.1,
                    }}>
                      I miei locali
                    </h1>
                    <span style={{ fontSize: 12, color: "var(--text-ghost)", fontWeight: 500 }}>
                      {reviews.length} {reviews.length === 1 ? "recensione" : "recensioni"}
                    </span>
                  </div>
                  <div style={{ display: "flex", gap: 8, alignItems: "center", position: "relative" }}>
                    {/* Menu button */}
                    <button
                      onClick={() => setMenuOpen(!menuOpen)}
                      style={{
                        width: 40, height: 40, borderRadius: 99,
                        border: "1.5px solid var(--border-strong)", background: "var(--surface)", color: "var(--text)",
                        fontSize: 18, display: "flex", alignItems: "center", justifyContent: "center",
                        cursor: "pointer", WebkitTapHighlightColor: "transparent",
                      }}
                      aria-label="Menu"
                    >
                      ⋯
                    </button>
                    {/* Add button */}
                    <button
                      onClick={() => { reset(); setView("add"); }}
                      style={{
                        width: 40, height: 40, borderRadius: 99,
                        border: "none", background: "var(--accent)", color: "var(--accent-inverse)",
                        fontSize: 22, display: "flex", alignItems: "center", justifyContent: "center",
                        cursor: "pointer", WebkitTapHighlightColor: "transparent",
                      }}
                      aria-label="Aggiungi"
                    >
                      +
                    </button>
                    {/* Dropdown menu */}
                    {menuOpen && (
                      <>
                        <div
                          onClick={() => setMenuOpen(false)}
                          style={{
                            position: "fixed", top: 0, left: 0, right: 0, bottom: 0,
                            zIndex: 20,
                          }}
                        />
                        <div style={{
                          position: "absolute", top: 48, right: 0,
                          background: "var(--surface)", borderRadius: 14,
                          border: "1px solid var(--border)",
                          boxShadow: "var(--shadow)",
                          minWidth: 180, overflow: "hidden",
                          zIndex: 30,
                        }}>
                          {[
                            {
                              key: "light",
                              label: "Tema chiaro",
                              icon: (
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
                                  <circle cx="12" cy="12" r="4" />
                                  <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" />
                                </svg>
                              ),
                            },
                            {
                              key: "dark",
                              label: "Tema scuro",
                              icon: (
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
                                  <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z" />
                                </svg>
                              ),
                            },
                            {
                              key: "auto",
                              label: "Automatico",
                              icon: (
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
                                  <circle cx="12" cy="12" r="9" />
                                  <path d="M12 3 A9 9 0 0 1 12 21 Z" fill="currentColor" stroke="none" />
                                </svg>
                              ),
                            },
                          ].map((opt) => (
                            <button
                              key={opt.key}
                              onClick={() => { setTheme(opt.key); setMenuOpen(false); }}
                              style={{
                                display: "flex", alignItems: "center", gap: 10,
                                width: "100%", textAlign: "left",
                                padding: "12px 16px", border: "none",
                                background: theme === opt.key ? "var(--pill-bg)" : "transparent",
                                fontSize: 14, color: "var(--text)", cursor: "pointer",
                                fontFamily: "'Instrument Sans', sans-serif",
                                borderBottom: "1px solid var(--border-soft)",
                                WebkitTapHighlightColor: "transparent",
                              }}
                            >
                              <span style={{ display: "inline-flex", width: 14, height: 14, color: "var(--text-faint)" }}>{opt.icon}</span>
                              {opt.label}
                            </button>
                          ))}
                          <button
                            onClick={handleExport}
                            style={{
                              display: "flex", alignItems: "center", gap: 10,
                              width: "100%", textAlign: "left",
                              padding: "12px 16px", border: "none", background: "transparent",
                              fontSize: 14, color: "var(--text)", cursor: "pointer",
                              fontFamily: "'Instrument Sans', sans-serif",
                              borderBottom: "1px solid var(--border-soft)",
                              WebkitTapHighlightColor: "transparent",
                            }}
                          >
                            <span style={{ display: "inline-flex", width: 14, height: 14, color: "var(--text-faint)" }}>
                              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                                <polyline points="7 10 12 15 17 10" />
                                <line x1="12" y1="15" x2="12" y2="3" />
                              </svg>
                            </span>
                            Esporta dati
                          </button>
                          <button
                            onClick={handleImportClick}
                            style={{
                              display: "flex", alignItems: "center", gap: 10,
                              width: "100%", textAlign: "left",
                              padding: "12px 16px", border: "none", background: "transparent",
                              fontSize: 14, color: "var(--text)", cursor: "pointer",
                              fontFamily: "'Instrument Sans', sans-serif",
                              WebkitTapHighlightColor: "transparent",
                            }}
                          >
                            <span style={{ display: "inline-flex", width: 14, height: 14, color: "var(--text-faint)" }}>
                              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                                <polyline points="17 8 12 3 7 8" />
                                <line x1="12" y1="3" x2="12" y2="15" />
                              </svg>
                            </span>
                            Importa dati
                          </button>
                        </div>
                      </>
                    )}
                  </div>
                </>
              ) : (
                <>
                  <button
                    onClick={() => { setView(view === "add" && editingId ? "detail" : "list"); reset(); }}
                    style={{
                      background: "none", border: "none", fontSize: 15, fontWeight: 500,
                      color: "var(--text)", cursor: "pointer", padding: "8px 0",
                      WebkitTapHighlightColor: "transparent",
                    }}
                  >
                    ← Indietro
                  </button>
                  <span style={{ fontFamily: "'Playfair Display', serif", fontSize: 24, fontWeight: 800 }}>
                    {view === "add" ? (editingId ? "Modifica" : "Nuova recensione") : "Dettaglio"}
                  </span>
                  <div style={{ width: 70 }} />
                </>
              )}
            </div>
          </div>

          {/* LIST */}
          {view === "list" && (
            <div style={{ padding: "14px 20px 40px" }}>
              <input
                type="text"
                placeholder="Cerca…"
                value={search}
                onChange={(e) => setSearch(e.target.value)}
                style={{
                  width: "100%", padding: "11px 20px", borderRadius: 99,
                  border: "1.5px solid var(--border-strong)", background: "var(--surface)",
                  fontSize: 15, color: "var(--text)", outline: "none",
                  marginBottom: 12, transition: "border-color 0.15s",
                }}
                onFocus={(e) => e.target.style.borderColor = "var(--accent)"}
                onBlur={(e) => e.target.style.borderColor = "var(--border-strong)"}
              />

              <div style={{ display: "flex", gap: 6, overflowX: "auto", paddingBottom: 2, marginBottom: 10, WebkitOverflowScrolling: "touch" }}>
                {TIPOLOGIE.map((t) => (
                  <Pill key={t.key} label={t.label} selected={filter === t.key} onClick={() => setFilter(t.key)} />
                ))}
              </div>

              <div style={{ display: "flex", gap: 4, marginBottom: 16, alignItems: "center" }}>
                <span style={{ fontSize: 10, color: "var(--text-light)", fontWeight: 600, textTransform: "uppercase", letterSpacing: 0.8, marginRight: 4 }}>Ordina</span>
                {[{ k: "date", l: "Recenti" }, { k: "rating", l: "Voto" }].map((s) => (
                  <button
                    key={s.k}
                    onClick={() => setSort(s.k)}
                    style={{
                      padding: "4px 10px", borderRadius: 6, border: "none",
                      background: sort === s.k ? "var(--pill-bg)" : "transparent",
                      color: sort === s.k ? "var(--text)" : "var(--text-light)",
                      fontSize: 12, fontWeight: 600, cursor: "pointer",
                      WebkitTapHighlightColor: "transparent",
                    }}
                  >
                    {s.l}
                  </button>
                ))}
              </div>

              {filtered.length === 0 ? (
                <div style={{ textAlign: "center", padding: "60px 20px", color: "var(--text-lighter)" }}>
                  <p style={{ fontFamily: "'Playfair Display', serif", fontSize: 28, fontWeight: 800, marginBottom: 6, color: "var(--text-ghost)" }}>
                    {reviews.length === 0 ? "Nessuna recensione" : "Nessun risultato"}
                  </p>
                  <p style={{ fontSize: 13 }}>{reviews.length === 0 ? "Tocca + per iniziare" : "Prova a cambiare i filtri"}</p>
                </div>
              ) : (
                <div style={{ borderRadius: 14, overflow: "hidden", border: "1px solid var(--border)" }}>
                  {filtered.map((r, i) => {
                    const a = avg(r);
                    return (
                      <div
                        className="card-item"
                        key={r.id}
                        onClick={() => { setDetail(r); setView("detail"); }}
                        style={{
                          background: "var(--surface)", padding: "17px 18px", cursor: "pointer",
                          borderBottom: i < filtered.length - 1 ? "1px solid var(--border-soft)" : "none",
                          display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12,
                          WebkitTapHighlightColor: "transparent",
                        }}
                      >
                        <div style={{ minWidth: 0, flex: 1 }}>
                          <div style={{
                            fontFamily: "'Playfair Display', serif",
                            fontSize: 24, fontWeight: 800, lineHeight: 1.2,
                            overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
                            paddingBottom: 2,
                          }}>
                            {r.name}
                          </div>
                          {r.comune && (
                            <div style={{
                              fontFamily: "'Playfair Display', serif",
                              fontSize: 13, fontWeight: 400, fontStyle: "italic",
                              color: "var(--text-ghost)", marginTop: 2,
                              overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
                            }}>
                              {r.comune}
                            </div>
                          )}
                        </div>
                        <div style={{
                          fontFamily: "'Instrument Sans', sans-serif",
                          fontWeight: 700, fontSize: 26, color: "var(--text)",
                          flexShrink: 0, lineHeight: 1,
                        }}>
                          {a.toFixed(1)}
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          )}

          {/* ADD / EDIT */}
          {view === "add" && (
            <div style={{ padding: "24px 20px 40px" }}>
              <label style={lbl}>Nome del locale</label>
              <input
                type="text"
                placeholder="es. Trattoria da Mario"
                value={fn}
                onChange={(e) => { setFn(e.target.value); setErr(""); }}
                style={inp}
                onFocus={(e) => e.target.style.borderColor = "var(--accent)"}
                onBlur={(e) => e.target.style.borderColor = "var(--border-strong)"}
              />

              <label style={{ ...lbl, marginTop: 18 }}>Comune</label>
              <input
                type="text"
                placeholder="es. Milano"
                value={fcomune}
                onChange={(e) => setFcomune(e.target.value)}
                style={inp}
                onFocus={(e) => e.target.style.borderColor = "var(--accent)"}
                onBlur={(e) => e.target.style.borderColor = "var(--border-strong)"}
              />

              <label style={{ ...lbl, marginTop: 22 }}>Tipologia</label>
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 4 }}>
                {TIPOLOGIE.map((t) => (
                  <Pill key={t.key} label={t.label} selected={ft === t.key} onClick={() => { setFt(t.key); setErr(""); }} />
                ))}
              </div>

              <label style={{ ...lbl, marginTop: 22 }}>Data visita</label>
              <input
                type="date"
                value={fdate}
                onChange={(e) => { setFdate(e.target.value); setErr(""); }}
                style={inp}
                onFocus={(e) => e.target.style.borderColor = "var(--accent)"}
                onBlur={(e) => e.target.style.borderColor = "var(--border-strong)"}
              />

              <label style={{ ...lbl, marginTop: 26 }}>Voti</label>
              <div style={{ background: "var(--surface)", borderRadius: 22, border: "1px solid var(--border)", overflow: "hidden" }}>
                {CATEGORIES.map((c, i) => (
                  <div key={c.key} style={{
                    display: "flex", justifyContent: "space-between", alignItems: "center",
                    padding: "12px 20px",
                    borderBottom: i < CATEGORIES.length - 1 ? "1px solid var(--border-faint)" : "none",
                  }}>
                    <span style={{ fontSize: 14, fontWeight: 500 }}>{c.label}</span>
                    <ScoreInput value={fr[c.key]} onChange={(v) => { setFr({ ...fr, [c.key]: v }); setErr(""); }} />
                  </div>
                ))}
              </div>

              <label style={{ ...lbl, marginTop: 26 }}>Note</label>
              <textarea
                placeholder="Opzionale…"
                value={fnote}
                onChange={(e) => setFnote(e.target.value)}
                rows={3}
                style={textareaStyle}
                onFocus={(e) => e.target.style.borderColor = "var(--accent)"}
                onBlur={(e) => e.target.style.borderColor = "var(--border-strong)"}
              />

              {err && (
                <div style={{
                  background: "var(--danger-bg)", border: "1px solid #f0d5d5", borderRadius: 99,
                  padding: "10px 20px", marginTop: 16, fontSize: 13, color: "var(--danger)", fontWeight: 500,
                }}>
                  {err}
                </div>
              )}

              <button
                onClick={submit}
                style={{
                  width: "100%", marginTop: 24, padding: "15px",
                  borderRadius: 99, border: "none",
                  background: "var(--accent)", color: "var(--accent-inverse)",
                  fontSize: 15, fontWeight: 600, cursor: "pointer",
                  WebkitTapHighlightColor: "transparent",
                }}
              >
                {editingId ? "Salva modifiche" : "Salva"}
              </button>
            </div>
          )}

          {/* DETAIL */}
          {view === "detail" && detail && (() => {
            const a = avg(detail);
            return (
              <div style={{ padding: "28px 20px 40px" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 6, gap: 16 }}>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <h2 style={{
                      fontFamily: "'Playfair Display', serif",
                      fontSize: 38, fontWeight: 800, lineHeight: 1,
                    }}>
                      {detail.name}
                    </h2>
                    {detail.comune && (
                      <p style={{
                        fontFamily: "'Playfair Display', serif",
                        fontSize: 15, fontWeight: 400, fontStyle: "italic",
                        color: "var(--text-ghost)", marginTop: 8,
                      }}>
                        {detail.comune}
                      </p>
                    )}
                  </div>
                  <span style={{
                    fontFamily: "'Instrument Sans', sans-serif",
                    fontSize: 40, fontWeight: 700, flexShrink: 0, lineHeight: 1,
                  }}>
                    {a.toFixed(1)}
                  </span>
                </div>

                <div style={{ display: "flex", gap: 10, alignItems: "center", marginBottom: 30, marginTop: 10 }}>
                  <span style={{
                    fontSize: 12, fontWeight: 600, color: "var(--text-faint)",
                    background: "var(--pill-bg-2)", padding: "3px 12px", borderRadius: 99,
                  }}>
                    {tipLabel(detail.tipologia)}
                  </span>
                  <span style={{ fontSize: 12, color: "var(--text-lighter)" }}>
                    {new Date(detail.date).toLocaleDateString("it-IT", { weekday: "long", day: "numeric", month: "long", year: "numeric" })}
                  </span>
                </div>

                {CATEGORIES.map((c) => (
                  <div key={c.key} style={{
                    display: "flex", justifyContent: "space-between", alignItems: "center",
                    padding: "12px 0", borderBottom: "1px solid var(--border-ghost)",
                  }}>
                    <span style={{ fontSize: 14, fontWeight: 500, color: "var(--text-muted)" }}>{c.label}</span>
                    <div style={{ display: "flex", alignItems: "center" }}>
                      <ScoreInput value={detail.ratings[c.key]} />
                    </div>
                  </div>
                ))}

                {detail.note && (
                  <div style={{
                    background: "var(--surface-alt)", borderRadius: 22, padding: "14px 20px",
                    marginTop: 24, borderLeft: "3px solid var(--border-strong)",
                  }}>
                    <p style={{
                      margin: 0, fontSize: 19, lineHeight: 1.6,
                      color: "var(--text-muted)", fontStyle: "italic",
                      fontFamily: "'Playfair Display', serif",
                    }}>
                      {detail.note}
                    </p>
                  </div>
                )}

                <button
                  onClick={() => startEdit(detail)}
                  style={{
                    width: "100%", marginTop: 32, padding: "14px",
                    borderRadius: 99, border: "none",
                    background: "var(--accent)", color: "var(--accent-inverse)",
                    fontSize: 14, fontWeight: 600, cursor: "pointer",
                    WebkitTapHighlightColor: "transparent",
                  }}
                >
                  Modifica
                </button>

                <button
                  onClick={() => { if (confirm("Eliminare questa recensione?")) del(detail.id); }}
                  style={{
                    width: "100%", marginTop: 10, padding: "13px",
                    borderRadius: 99, border: "1.5px solid var(--border-strong)",
                    background: "transparent", color: "var(--danger)",
                    fontSize: 14, fontWeight: 600, cursor: "pointer",
                    WebkitTapHighlightColor: "transparent",
                  }}
                >
                  Elimina
                </button>
              </div>
            );
          })()}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
