<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0f0f10" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Localini" />
  <title>Localini</title>

  <!-- Single icon used everywhere: favicon, bookmark, apple touch icon -->
  <link rel="icon" type="image/png" href="./icons/favicon.png" />
  <link rel="shortcut icon" type="image/png" href="./icons/favicon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="./icons/icon.png" />
  <link rel="apple-touch-icon-precomposed" sizes="180x180" href="./icons/icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;0,900;1,400;1,700&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <!-- Leaflet for maps (OpenStreetMap-based, no API key required) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <!-- jsPDF for PDF export -->
  <script src="https://unpkg.com/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #fafafa;
      --bg-translucent: rgba(250,250,250,0.92);
      --surface: #fff;
      --surface-alt: #f8f8f8;
      --text: #1a1a1a;
      --text-muted: #666;
      --text-faint: #999;
      --text-ghost: #aaa;
      --text-light: #bbb;
      --text-lighter: #ccc;
      --border: #eee;
      --border-strong: #e4e4e4;
      --border-soft: #f2f2f2;
      --border-faint: #f5f5f5;
      --border-ghost: #f0f0f0;
      --pill-bg: #f5f5f5;
      --pill-bg-2: #f0f0f0;
      --accent: #1a1a1a;
      --accent-inverse: #fff;
      --danger: #c44;
      --danger-bg: #fef5f5;
      --danger-border: #f0d5d5;
      --shadow: 0 8px 32px rgba(0,0,0,0.08);
    }
    [data-theme="dark"] {
      --bg: #0f0f10;
      --bg-translucent: rgba(15,15,16,0.92);
      --surface: #1a1a1c;
      --surface-alt: #202023;
      --text: #f0ede6;
      --text-muted: #b8b3a8;
      --text-faint: #85807a;
      --text-ghost: #706b66;
      --text-light: #5c5854;
      --text-lighter: #4a4743;
      --border: #2a2a2d;
      --border-strong: #333336;
      --border-soft: #252528;
      --border-faint: #222225;
      --border-ghost: #252528;
      --pill-bg: #252528;
      --pill-bg-2: #2a2a2d;
      --accent: #f0ede6;
      --accent-inverse: #0f0f10;
      --danger: #e67373;
      --danger-bg: #2a1818;
      --danger-border: #4a2828;
      --shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    @media (prefers-color-scheme: dark) {
      [data-theme="auto"] {
        --bg: #0f0f10;
        --bg-translucent: rgba(15,15,16,0.92);
        --surface: #1a1a1c;
        --surface-alt: #202023;
        --text: #f0ede6;
        --text-muted: #b8b3a8;
        --text-faint: #85807a;
        --text-ghost: #706b66;
        --text-light: #5c5854;
        --text-lighter: #4a4743;
        --border: #2a2a2d;
        --border-strong: #333336;
        --border-soft: #252528;
        --border-faint: #222225;
        --border-ghost: #252528;
        --pill-bg: #252528;
        --pill-bg-2: #2a2a2d;
        --accent: #f0ede6;
        --accent-inverse: #0f0f10;
        --danger: #e67373;
        --danger-bg: #2a1818;
        --danger-border: #4a2828;
        --shadow: 0 8px 32px rgba(0,0,0,0.4);
      }
    }
    html {
      background-color: #0f0f10;
      -webkit-text-size-adjust: 100%;
    }
    html[data-theme="light"] {
      background-color: #fafafa;
    }
    html[data-theme="light"] body {
      background-color: #fafafa;
    }
    html[data-theme="dark"] body {
      background-color: #0f0f10;
    }
    @media (prefers-color-scheme: light) {
      html[data-theme="auto"],
      html[data-theme="auto"] body {
        background-color: #fafafa;
      }
    }
    @media (prefers-color-scheme: dark) {
      html[data-theme="auto"],
      html[data-theme="auto"] body {
        background-color: #0f0f10;
      }
    }
    body {
      background: var(--bg);
      min-height: 100vh;
      font-family: 'Instrument Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      transition: background-color 0.25s, color 0.25s;
    }
    input, textarea, button { font-family: inherit; }
    input, textarea { box-sizing: border-box; max-width: 100%; }
    input[type="date"] { -webkit-appearance: none; appearance: none; }
    input::placeholder, textarea::placeholder { color: var(--text-lighter); }
    input[type="date"]::-webkit-calendar-picker-indicator {
      filter: var(--date-icon-filter, none);
    }
    [data-theme="dark"] input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(1);
    }
    .card-item { transition: background 0.1s; }
    @media (hover: hover) { .card-item:hover { background: var(--surface-alt) !important; } }

    /* Localini map pins (divIcon) */
    .localini-pin {
      background: transparent !important;
      border: none !important;
    }

    /* Leaflet map styling */
    .leaflet-container {
      background: var(--surface-alt);
      font-family: 'Instrument Sans', sans-serif;
    }
    .leaflet-control-zoom a {
      background: var(--surface) !important;
      color: var(--text) !important;
      border-color: var(--border-strong) !important;
    }
    .leaflet-control-zoom a:hover {
      background: var(--surface-alt) !important;
    }
    .leaflet-popup-content-wrapper, .leaflet-popup-tip {
      background: var(--surface) !important;
      color: var(--text) !important;
      border-radius: 12px !important;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12) !important;
    }
    .leaflet-popup-content {
      margin: 12px 14px !important;
      font-family: 'Instrument Sans', sans-serif !important;
    }
    .leaflet-popup-close-button {
      color: var(--text-faint) !important;
    }
    .leaflet-control-attribution {
      background: rgba(255,255,255,0.7) !important;
      font-size: 9px !important;
    }
    html[data-theme="dark"] .leaflet-control-attribution {
      background: rgba(15,15,16,0.7) !important;
      color: var(--text-faint) !important;
    }
    html[data-theme="dark"] .leaflet-control-attribution a {
      color: var(--text-muted) !important;
    }
    /* Dark mode tile filter to match theme */
    html[data-theme="dark"] .leaflet-tile {
      filter: brightness(0.6) invert(1) contrast(3) hue-rotate(200deg) saturate(0.3) brightness(0.7);
    }
    @media (prefers-color-scheme: dark) {
      html[data-theme="auto"] .leaflet-tile {
        filter: brightness(0.6) invert(1) contrast(3) hue-rotate(200deg) saturate(0.3) brightness(0.7);
      }
    }

    /* Cutlery logo: show the right one based on active theme */
    .logo-cutlery-cream { display: none; }
    .logo-cutlery-dark { display: block; }
    html[data-theme="dark"] .logo-cutlery-cream { display: block; }
    html[data-theme="dark"] .logo-cutlery-dark { display: none; }
    @media (prefers-color-scheme: dark) {
      html[data-theme="auto"] .logo-cutlery-cream { display: block; }
      html[data-theme="auto"] .logo-cutlery-dark { display: none; }
    }
    @media (prefers-color-scheme: light) {
      html[data-theme="auto"] .logo-cutlery-cream { display: none; }
      html[data-theme="auto"] .logo-cutlery-dark { display: block; }
    }
  </style>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    const { useState, useEffect, useCallback, useRef } = React;

    const CATEGORIES = [
      { key: "location", label: "Location" },
      { key: "menu", label: "Menu" },
      { key: "servizio", label: "Servizio" },
      { key: "conto", label: "Conto" },
    ];

    const TIPOLOGIE = [
      { key: "pranzo_cena", label: "Pranzo / Cena" },
      { key: "colazione", label: "Bar / Colazione" },
      { key: "aperitivo", label: "Aperitivo" },
    ];

    // Etichette shown depending on tipologia
    const ETICHETTE_PRANZO_CENA = [
      { key: "pizza", label: "Pizza" },
      { key: "carne", label: "Carne" },
      { key: "pesce", label: "Pesce" },
      { key: "etnico", label: "Etnico" },
      { key: "panini", label: "Panini" },
      { key: "pub", label: "Pub" },
      { key: "economico", label: "Economico" },
      { key: "bambini", label: "Adatto ai bambini" },
      { key: "veloce", label: "Veloce" },
      { key: "elaborata", label: "Cucina elaborata" },
      { key: "semplice", label: "Cucina semplice" },
      { key: "vegano", label: "Vegano" },
      { key: "senza_glutine", label: "Senza glutine" },
    ];

    const ETICHETTE_COLAZIONE = [
      { key: "ottimo_caffe", label: "Ottimo caffè" },
      { key: "ottime_paste", label: "Ottime paste" },
      { key: "grande_varieta", label: "Grande varietà" },
      { key: "molti_posti", label: "Molti posti a sedere" },
      { key: "posti_aperto", label: "Posti all'aperto" },
      { key: "parcheggio_facile", label: "Parcheggio facile" },
      { key: "dolce_salato", label: "Dolce e salato" },
      { key: "ottimo_cappuccino", label: "Ottimo cappuccino" },
      { key: "vegano", label: "Vegano" },
      { key: "senza_glutine", label: "Senza glutine" },
    ];

    const ETICHETTE_APERITIVO = [
      { key: "ottimi_cocktail", label: "Ottimi cocktail" },
      { key: "grande_varieta", label: "Grande varietà" },
      { key: "molti_posti", label: "Molti posti a sedere" },
      { key: "posti_aperto", label: "Posti all'aperto" },
      { key: "parcheggio_facile", label: "Parcheggio facile" },
      { key: "vegano", label: "Vegano" },
      { key: "senza_glutine", label: "Senza glutine" },
    ];

    // Map tipologia key → its label list, for both rendering and search
    const ETICHETTE_BY_TIPOLOGIA = {
      pranzo_cena: ETICHETTE_PRANZO_CENA,
      colazione: ETICHETTE_COLAZIONE,
      aperitivo: ETICHETTE_APERITIVO,
    };

    // Backwards-compat alias for old code paths that referenced CRITERI_PRANZO_CENA
    const CRITERI_PRANZO_CENA = ETICHETTE_PRANZO_CENA;

    const STORAGE_KEY = "ristoranti_reviews";

    // Pin colors by tipologia
    const PIN_COLORS = {
      pranzo_cena: "#2563eb",   // blue
      colazione:   "#dc2626",   // red
      aperitivo:   "#f59e0b",   // amber/yellow
    };
    const DEFAULT_PIN_COLOR = "#6b7280";

    // Build a Leaflet divIcon with a colored map pin SVG
    function makePinIcon(color) {
      if (typeof L === "undefined") return null;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="30" height="42" viewBox="0 0 30 42">
        <path d="M15 0 C6.7 0 0 6.7 0 15 c0 11 15 27 15 27 s15 -16 15 -27 C30 6.7 23.3 0 15 0 z" fill="${color}" stroke="#fff" stroke-width="2"/>
        <circle cx="15" cy="15" r="5" fill="#fff"/>
      </svg>`;
      return L.divIcon({
        html: svg,
        className: "localini-pin",
        iconSize: [30, 42],
        iconAnchor: [15, 42],
        popupAnchor: [0, -38],
      });
    }

    const ScoreInput = ({ value, onChange }) => {
      const editable = !!onChange;
      return (
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          {editable && (
            <input
              type="range"
              min={0}
              max={10}
              step={1}
              value={value}
              onChange={(e) => onChange(Number(e.target.value))}
              style={{
                width: 120,
                height: 4,
                accentColor: "var(--accent)",
                cursor: "pointer",
              }}
            />
          )}
          <span style={{
            fontFamily: "'Instrument Sans', sans-serif",
            fontWeight: 700,
            fontSize: 20,
            color: "var(--text)",
            minWidth: 28,
            textAlign: "right",
            lineHeight: 1,
          }}>
            {value}
          </span>
        </div>
      );
    };

    const Pill = ({ label, selected, onClick }) => (
      <button
        type="button"
        onClick={onClick}
        style={{
          padding: "7px 16px",
          borderRadius: 99,
          border: `1.5px solid ${selected ? "var(--accent)" : "var(--border-strong)"}`,
          background: selected ? "var(--accent)" : "transparent",
          color: selected ? "var(--accent-inverse)" : "var(--text-faint)",
          fontFamily: "'Instrument Sans', sans-serif",
          fontSize: 13,
          fontWeight: 500,
          cursor: "pointer",
          transition: "all 0.15s",
          WebkitTapHighlightColor: "transparent",
          whiteSpace: "nowrap",
        }}
      >
        {label}
      </button>
    );

    function App() {
      const [reviews, setReviews] = useState([]);
      const [view, setView] = useState("list");
      const [detail, setDetail] = useState(null);
      const [filter, setFilter] = useState("pranzo_cena");
      const [search, setSearch] = useState("");
      const [sort, setSort] = useState("date");
      const [loaded, setLoaded] = useState(false);
      const [menuOpen, setMenuOpen] = useState(false);
      const [editingId, setEditingId] = useState(null);
      const [theme, setTheme] = useState(() => {
        try {
          return localStorage.getItem("ristoranti_theme") || "auto";
        } catch (e) { return "auto"; }
      });
      const fileInputRef = useRef(null);

      // Apply theme: CSS handles the "auto" case via prefers-color-scheme media query
      useEffect(() => {
        document.documentElement.setAttribute("data-theme", theme);
        try { localStorage.setItem("ristoranti_theme", theme); } catch (e) {}

        // Resolve actual color and update theme-color meta tag dynamically
        // so Safari iOS status bar follows the active theme
        const resolveColor = () => {
          let resolved = theme;
          if (theme === "auto") {
            resolved = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          }
          return resolved === "dark" ? "#0f0f10" : "#fafafa";
        };
        const updateMeta = () => {
          const meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute("content", resolveColor());
        };
        updateMeta();

        // Listen for system theme changes when in auto mode
        if (theme === "auto") {
          const mql = window.matchMedia("(prefers-color-scheme: dark)");
          mql.addEventListener("change", updateMeta);
          return () => mql.removeEventListener("change", updateMeta);
        }
      }, [theme]);

      // Form state
      const [fn, setFn] = useState("");
      const [fcomune, setFcomune] = useState("");
      const [ft, setFt] = useState(null);
      const [fr, setFr] = useState({ location: 0, menu: 0, servizio: 0, conto: 0 });
      const [fnote, setFnote] = useState("");
      const [fdate, setFdate] = useState("");
      const [fcriteri, setFcriteri] = useState([]);
      const [fcoords, setFcoords] = useState(null); // { lat, lng }
      const [geocoding, setGeocoding] = useState(false);
      const [geocodeErr, setGeocodeErr] = useState("");
      const [geocodeResults, setGeocodeResults] = useState([]); // list of candidate locations
      const [geocodeIndex, setGeocodeIndex] = useState(-1); // current position in the list
      const [geocodeQuery, setGeocodeQuery] = useState(""); // the query that produced the current results
      const shouldRecenterMap = useRef(false); // true right after a geocode, false after user tap/drag
      const [err, setErr] = useState("");
      const formMapRef = useRef(null);
      const formMarkerRef = useRef(null);
      const formMapContainerRef = useRef(null);
      const listMapRef = useRef(null);
      const listMapContainerRef = useRef(null);
      const detailMapRef = useRef(null);
      const detailMapContainerRef = useRef(null);

      useEffect(() => {
        window.scrollTo(0, 0);
      }, [view, detail]);

      useEffect(() => {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (raw) setReviews(JSON.parse(raw));
        } catch (e) {}
        setLoaded(true);
      }, []);

      const save = useCallback((data) => {
        setReviews(data);
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch (e) {}
      }, []);

      const avg = (r) => {
        const v = CATEGORIES.map((c) => r.ratings[c.key]);
        return v.length ? v.reduce((a, b) => a + b, 0) / v.length : 0;
      };

      const todayISO = () => {
        const d = new Date();
        const pad = (n) => String(n).padStart(2, "0");
        return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
      };

      const toDateInput = (iso) => {
        if (!iso) return todayISO();
        const d = new Date(iso);
        if (isNaN(d.getTime())) return todayISO();
        const pad = (n) => String(n).padStart(2, "0");
        return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
      };

      const reset = () => {
        setFn(""); setFcomune(""); setFt(null);
        setFr({ location: 0, menu: 0, servizio: 0, conto: 0 });
        setFnote(""); setFdate(todayISO()); setFcriteri([]);
        setFcoords(null); setGeocoding(false); setGeocodeErr("");
        setGeocodeResults([]); setGeocodeIndex(-1); setGeocodeQuery("");
        setErr(""); setEditingId(null);
      };

      const startEdit = (r) => {
        setEditingId(r.id);
        setFn(r.name);
        setFcomune(r.comune || "");
        setFt(r.tipologia);
        setFr({ ...r.ratings });
        setFnote(r.note || "");
        setFdate(toDateInput(r.date));
        setFcriteri(Array.isArray(r.criteri) ? r.criteri : []);
        setFcoords(r.lat != null && r.lng != null ? { lat: r.lat, lng: r.lng } : null);
        setGeocodeResults([]); setGeocodeIndex(-1); setGeocodeQuery(""); setGeocodeErr("");
        shouldRecenterMap.current = true;
        setErr("");
        setView("add");
      };

      const submit = () => {
        if (!fn.trim()) return setErr("Inserisci il nome del locale");
        if (!ft) return setErr("Seleziona una tipologia");
        if (Object.values(fr).some((v) => v == null)) return setErr("Dai un voto a tutte le categorie");
        if (!fdate) return setErr("Inserisci la data della visita");

        // Convert YYYY-MM-DD to ISO, preserve original time if editing same day
        const dateISO = new Date(fdate + "T12:00:00").toISOString();
        const criteriToSave = ETICHETTE_BY_TIPOLOGIA[ft] ? fcriteri : [];
        const coordsToSave = fcoords ? { lat: fcoords.lat, lng: fcoords.lng } : { lat: null, lng: null };

        if (editingId) {
          const updated = reviews.map((r) => r.id === editingId
            ? { ...r, name: fn.trim(), comune: fcomune.trim(), tipologia: ft, ratings: { ...fr }, note: fnote.trim(), date: dateISO, criteri: criteriToSave, ...coordsToSave }
            : r);
          save(updated);
          const updatedItem = updated.find((r) => r.id === editingId);
          if (detail && detail.id === editingId) setDetail(updatedItem);
        } else {
          const item = {
            id: Date.now().toString(),
            name: fn.trim(),
            comune: fcomune.trim(),
            tipologia: ft,
            ratings: { ...fr },
            note: fnote.trim(),
            date: dateISO,
            criteri: criteriToSave,
            ...coordsToSave,
          };
          save([item, ...reviews]);
        }
        reset();
        setView(editingId ? "detail" : "list");
      };

      // Geocode using Nominatim (OpenStreetMap) with result cycling
      const handleGeocode = async () => {
        if (!fn.trim()) { setGeocodeErr("Inserisci prima il nome del locale"); return; }

        const currentQuery = `${fn.trim()}|${fcomune.trim()}`;

        // If query is unchanged and we have more cached results, show the next one
        if (currentQuery === geocodeQuery && geocodeResults.length > 0) {
          const nextIndex = geocodeIndex + 1;
          if (nextIndex < geocodeResults.length) {
            const r = geocodeResults[nextIndex];
            setGeocodeIndex(nextIndex);
            shouldRecenterMap.current = true;
            setFcoords({ lat: parseFloat(r.lat), lng: parseFloat(r.lon) });
            const total = geocodeResults.length;
            if (nextIndex === total - 1) {
              setGeocodeErr(`Risultato ${nextIndex + 1} di ${total}. Nessun altro risultato disponibile — se non è corretto, tocca sulla mappa per posizionare manualmente.`);
            } else {
              setGeocodeErr(`Risultato ${nextIndex + 1} di ${total}. Tocca "Cerca di nuovo" per vedere il prossimo.`);
            }
            return;
          } else {
            // Already at the end of the list
            setGeocodeErr("Nessun altro risultato. Tocca sulla mappa per posizionare il pallino manualmente.");
            return;
          }
        }

        // New query: fetch fresh results from Nominatim
        setGeocoding(true);
        setGeocodeErr("");
        try {
          const queryString = [fn.trim(), fcomune.trim(), "Italia"].filter(Boolean).join(", ");
          const url = `https://nominatim.openstreetmap.org/search?format=json&limit=10&countrycodes=it&q=${encodeURIComponent(queryString)}`;
          const res = await fetch(url, { headers: { "Accept-Language": "it" } });
          const data = await res.json();

          if (data && data.length > 0) {
            setGeocodeResults(data);
            setGeocodeIndex(0);
            setGeocodeQuery(currentQuery);
            const r = data[0];
            shouldRecenterMap.current = true;
            setFcoords({ lat: parseFloat(r.lat), lng: parseFloat(r.lon) });
            if (data.length === 1) {
              setGeocodeErr("");
            } else {
              setGeocodeErr(`Risultato 1 di ${data.length}. Tocca "Cerca di nuovo" per vedere il prossimo.`);
            }
          } else {
            // Fallback: try with just the comune
            if (fcomune.trim()) {
              const fallbackUrl = `https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=it&q=${encodeURIComponent(fcomune.trim() + ", Italia")}`;
              const res2 = await fetch(fallbackUrl, { headers: { "Accept-Language": "it" } });
              const data2 = await res2.json();
              if (data2 && data2.length > 0) {
                setGeocodeResults(data2);
                setGeocodeIndex(0);
                setGeocodeQuery(currentQuery);
                const r = data2[0];
                shouldRecenterMap.current = true;
                setFcoords({ lat: parseFloat(r.lat), lng: parseFloat(r.lon) });
                setGeocodeErr("Trovato solo il comune. Tocca sulla mappa per posizionare il pallino.");
              } else {
                setGeocodeErr("Posizione non trovata. Prova con un nome diverso.");
              }
            } else {
              setGeocodeErr("Posizione non trovata. Aggiungi il comune e riprova.");
            }
          }
        } catch (e) {
          setGeocodeErr("Errore di rete durante la ricerca.");
        }
        setGeocoding(false);
      };

      const del = (id) => {
        save(reviews.filter((r) => r.id !== id));
        if (detail && detail.id === id) { setDetail(null); setView("list"); }
      };

      // Export JSON
      const handleExport = () => {
        setMenuOpen(false);
        const data = JSON.stringify(reviews, null, 2);
        const blob = new Blob([data], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        const today = new Date().toISOString().split("T")[0];
        a.download = `localini-${today}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      };

      // Export CSV
      const handleExportCSV = () => {
        setMenuOpen(false);
        // CSV escape: wrap in quotes and double internal quotes
        const esc = (v) => {
          if (v == null) return "";
          const s = String(v);
          if (s.includes(",") || s.includes('"') || s.includes("\n")) {
            return '"' + s.replace(/"/g, '""') + '"';
          }
          return s;
        };
        const headers = [
          "Nome", "Comune", "Tipologia", "Data",
          "Location", "Menu", "Servizio", "Conto", "Media",
          "Etichette", "Note", "Latitudine", "Longitudine",
        ];
        const rows = reviews.map((r) => {
          const list = ETICHETTE_BY_TIPOLOGIA[r.tipologia] || [];
          const labels = (r.criteri || [])
            .map((k) => {
              const c = list.find((x) => x.key === k);
              return c ? c.label : k;
            })
            .join("; ");
          const date = r.date ? new Date(r.date).toLocaleDateString("it-IT") : "";
          const a = avg(r);
          return [
            esc(r.name),
            esc(r.comune || ""),
            esc(tipLabel(r.tipologia)),
            esc(date),
            esc(r.ratings?.location ?? ""),
            esc(r.ratings?.menu ?? ""),
            esc(r.ratings?.servizio ?? ""),
            esc(r.ratings?.conto ?? ""),
            esc(a.toFixed(1)),
            esc(labels),
            esc(r.note || ""),
            esc(r.lat != null ? r.lat : ""),
            esc(r.lng != null ? r.lng : ""),
          ].join(",");
        });
        // BOM so Excel opens with correct UTF-8 encoding
        const csv = "\ufeff" + headers.join(",") + "\n" + rows.join("\n");
        const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        const today = new Date().toISOString().split("T")[0];
        a.download = `localini-${today}.csv`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      };

      // Export PDF (uses jsPDF loaded from CDN)
      const handleExportPDF = async () => {
        setMenuOpen(false);
        if (typeof window.jspdf === "undefined") {
          alert("Libreria PDF non ancora caricata. Attendi qualche secondo e riprova.");
          return;
        }
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ unit: "pt", format: "a4" });
        const pageWidth = doc.internal.pageSize.getWidth();
        const pageHeight = doc.internal.pageSize.getHeight();
        const margin = 48;
        let y = margin;

        // Build the title as a canvas image: cutlery icon + "Localini" in Playfair Display.
        // The browser already has Playfair loaded for the UI, so canvas can render with it.
        const buildTitleImage = async () => {
          // Load the cutlery PNG (cream version, but we'll recolor to dark for the white PDF page)
          const loadImg = (src) => new Promise((resolve, reject) => {
            const img = new Image();
            img.crossOrigin = "anonymous";
            img.onload = () => resolve(img);
            img.onerror = reject;
            img.src = src;
          });
          let cutleryImg = null;
          try {
            cutleryImg = await loadImg("./icons/cutlery-dark.png");
          } catch (e) {
            // ignore — we'll just render the text without the icon
          }

          // Wait one frame so Playfair is sure to be ready
          await document.fonts.ready;

          const scale = 3; // retina-ish
          const titleText = "Localini";
          // Measure the text first using a temporary canvas
          const measureCanvas = document.createElement("canvas");
          const mctx = measureCanvas.getContext("2d");
          mctx.font = `800 56px 'Playfair Display', serif`;
          const textWidth = mctx.measureText(titleText).width;
          const iconHeight = 56;
          const iconWidth = cutleryImg ? Math.round(cutleryImg.width * (iconHeight / cutleryImg.height)) : 0;
          const gap = cutleryImg ? 16 : 0;
          const totalWidth = Math.ceil(iconWidth + gap + textWidth);
          const totalHeight = 70;

          const canvas = document.createElement("canvas");
          canvas.width = totalWidth * scale;
          canvas.height = totalHeight * scale;
          const ctx = canvas.getContext("2d");
          ctx.scale(scale, scale);

          // Draw icon
          if (cutleryImg) {
            ctx.drawImage(cutleryImg, 0, 7, iconWidth, iconHeight);
          }

          // Draw title text
          ctx.font = `800 56px 'Playfair Display', serif`;
          ctx.fillStyle = "#1a1a1a";
          ctx.textBaseline = "alphabetic";
          ctx.fillText(titleText, iconWidth + gap, 56);

          return {
            dataUrl: canvas.toDataURL("image/png"),
            width: totalWidth,
            height: totalHeight,
          };
        };

        try {
          const titleImg = await buildTitleImage();
          // Render the title image at a tasteful size at the top of the page
          const targetHeight = 36;
          const targetWidth = titleImg.width * (targetHeight / titleImg.height);
          doc.addImage(titleImg.dataUrl, "PNG", margin, y, targetWidth, targetHeight);
          y += targetHeight + 6;
        } catch (e) {
          // Fallback: plain helvetica title
          doc.setFont("helvetica", "bold");
          doc.setFontSize(24);
          doc.text("Localini", margin, y + 18);
          y += 28;
        }

        // Subtitle
        doc.setFont("helvetica", "normal");
        doc.setFontSize(10);
        doc.setTextColor(120);
        doc.text(
          `${reviews.length} ${reviews.length === 1 ? "recensione" : "recensioni"} • Esportato il ${new Date().toLocaleDateString("it-IT")}`,
          margin, y
        );
        y += 24;
        doc.setTextColor(0);

        // Sort reviews by avg desc
        const sorted = [...reviews].sort((a, b) => avg(b) - avg(a));

        sorted.forEach((r, idx) => {
          const a = avg(r);
          const list = ETICHETTE_BY_TIPOLOGIA[r.tipologia] || [];
          const labels = (r.criteri || [])
            .map((k) => {
              const c = list.find((x) => x.key === k);
              return c ? c.label : k;
            })
            .join(" · ");
          const date = r.date ? new Date(r.date).toLocaleDateString("it-IT") : "";

          // Estimate block height to handle page breaks
          const noteLines = r.note ? doc.splitTextToSize(r.note, pageWidth - margin * 2 - 10) : [];
          const labelLines = labels ? doc.splitTextToSize(labels, pageWidth - margin * 2 - 10) : [];
          const blockHeight = 60 + noteLines.length * 11 + labelLines.length * 11;

          if (y + blockHeight > pageHeight - margin) {
            doc.addPage();
            y = margin;
          }

          // Name + score
          doc.setFont("helvetica", "bold");
          doc.setFontSize(14);
          doc.setTextColor(20);
          doc.text(r.name, margin, y);
          const scoreText = a.toFixed(1);
          const scoreWidth = doc.getTextWidth(scoreText);
          doc.text(scoreText, pageWidth - margin - scoreWidth, y);
          y += 14;

          // Comune + tipologia + date
          doc.setFont("helvetica", "italic");
          doc.setFontSize(10);
          doc.setTextColor(120);
          const meta = [r.comune, tipLabel(r.tipologia), date].filter(Boolean).join(" · ");
          doc.text(meta, margin, y);
          y += 14;

          // Ratings line
          doc.setFont("helvetica", "normal");
          doc.setFontSize(9);
          doc.setTextColor(80);
          const ratingsText = `Location ${r.ratings?.location ?? "-"}   Menu ${r.ratings?.menu ?? "-"}   Servizio ${r.ratings?.servizio ?? "-"}   Conto ${r.ratings?.conto ?? "-"}`;
          doc.text(ratingsText, margin, y);
          y += 12;

          // Etichette
          if (labelLines.length > 0) {
            doc.setFontSize(9);
            doc.setTextColor(110);
            labelLines.forEach((line) => {
              doc.text(line, margin, y);
              y += 11;
            });
          }

          // Note
          if (noteLines.length > 0) {
            doc.setFont("helvetica", "italic");
            doc.setFontSize(9);
            doc.setTextColor(100);
            noteLines.forEach((line) => {
              doc.text(line, margin, y);
              y += 11;
            });
          }

          // Generous spacing between reviews instead of a separator line
          y += 22;
        });

        const today = new Date().toISOString().split("T")[0];
        doc.save(`localini-${today}.pdf`);
      };

      // Import
      const handleImportClick = () => {
        setMenuOpen(false);
        fileInputRef.current?.click();
      };

      const handleImportFile = (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const imported = JSON.parse(ev.target.result);
            if (!Array.isArray(imported)) throw new Error();
            const choice = confirm(
              `Trovate ${imported.length} recensioni nel file.\n\n` +
              `OK = unisci con quelle attuali\n` +
              `Annulla = sostituisci tutto`
            );
            if (choice) {
              // Merge, avoid duplicates by id
              const existingIds = new Set(reviews.map((r) => r.id));
              const newOnes = imported.filter((r) => !existingIds.has(r.id));
              save([...newOnes, ...reviews]);
              alert(`Importate ${newOnes.length} nuove recensioni.`);
            } else {
              save(imported);
              alert(`Importate ${imported.length} recensioni.`);
            }
          } catch (err) {
            alert("File non valido. Deve essere un file JSON esportato da questa app.");
          }
        };
        reader.readAsText(file);
        e.target.value = "";
      };

      const filtered = reviews
        .filter((r) => !filter || r.tipologia === filter)
        .filter((r) => {
          if (!search) return true;
          const q = search.toLowerCase();
          // Resolve criteri keys to their labels using the tipologia-specific list
          const list = ETICHETTE_BY_TIPOLOGIA[r.tipologia] || [];
          const criteriLabels = (r.criteri || [])
            .map((k) => {
              const c = list.find((x) => x.key === k);
              return c ? c.label.toLowerCase() : "";
            })
            .join(" ");
          return (
            r.name.toLowerCase().includes(q) ||
            (r.comune || "").toLowerCase().includes(q) ||
            (r.note || "").toLowerCase().includes(q) ||
            criteriLabels.includes(q)
          );
        })
        .sort((a, b) => sort === "rating" ? avg(b) - avg(a) : new Date(b.date) - new Date(a.date));

      const tipLabel = (k) => {
        const t = TIPOLOGIE.find((x) => x.key === k);
        return t ? t.label : "";
      };

      // Build a Leaflet map for the form (mini, draggable marker + tap-to-place)
      useEffect(() => {
        if (view !== "add" || !fcoords || !formMapContainerRef.current) return;
        if (typeof L === "undefined") return;

        if (!formMapRef.current) {
          const initialZoom = 14;
          const map = L.map(formMapContainerRef.current, {
            zoomControl: true,
            attributionControl: true,
          }).setView([fcoords.lat, fcoords.lng], initialZoom);
          L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
            attribution: "© OpenStreetMap",
            maxZoom: 19,
          }).addTo(map);
          const formPinColor = PIN_COLORS[ft] || DEFAULT_PIN_COLOR;
          const marker = L.marker([fcoords.lat, fcoords.lng], { draggable: true, icon: makePinIcon(formPinColor) }).addTo(map);
          marker.on("dragend", (e) => {
            const pos = e.target.getLatLng();
            shouldRecenterMap.current = false;
            setFcoords({ lat: pos.lat, lng: pos.lng });
          });
          // Tap/click anywhere on the map to move the marker there
          map.on("click", (e) => {
            shouldRecenterMap.current = false;
            setFcoords({ lat: e.latlng.lat, lng: e.latlng.lng });
          });
          formMapRef.current = map;
          formMarkerRef.current = marker;
          shouldRecenterMap.current = false;
          setTimeout(() => map.invalidateSize(), 100);
        } else {
          // Update marker position
          formMarkerRef.current.setLatLng([fcoords.lat, fcoords.lng]);
          // Recenter only if coords came from geocoding, not from user tap/drag
          if (shouldRecenterMap.current) {
            formMapRef.current.setView([fcoords.lat, fcoords.lng], 14);
            shouldRecenterMap.current = false;
          }
          setTimeout(() => formMapRef.current.invalidateSize(), 100);
        }
      }, [view, fcoords]);

      // Update form marker color when tipologia changes
      useEffect(() => {
        if (formMarkerRef.current && typeof L !== "undefined") {
          const color = PIN_COLORS[ft] || DEFAULT_PIN_COLOR;
          formMarkerRef.current.setIcon(makePinIcon(color));
        }
      }, [ft]);

      // Clean up form map when leaving add view
      useEffect(() => {
        if (view !== "add" && formMapRef.current) {
          formMapRef.current.remove();
          formMapRef.current = null;
          formMarkerRef.current = null;
        }
      }, [view]);

      // Build the main map view with all geolocated reviews
      useEffect(() => {
        if (view !== "map" || !listMapContainerRef.current) return;
        if (typeof L === "undefined") return;

        if (!listMapRef.current) {
          // Center on Italy (approximate geographic center)
          const map = L.map(listMapContainerRef.current, {
            zoomControl: true,
            attributionControl: true,
          }).setView([42.5, 12.5], 6);
          L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
            attribution: "© OpenStreetMap",
            maxZoom: 19,
          }).addTo(map);
          listMapRef.current = map;
        }

        const map = listMapRef.current;

        // Clear existing markers
        map.eachLayer((layer) => {
          if (layer instanceof L.Marker) map.removeLayer(layer);
        });

        // Add a marker for each review with coordinates
        const withCoords = reviews.filter((r) => r.lat != null && r.lng != null);
        const bounds = [];
        withCoords.forEach((r) => {
          const a = avg(r);
          const marker = L.marker([r.lat, r.lng], { icon: makePinIcon(PIN_COLORS[r.tipologia] || DEFAULT_PIN_COLOR) }).addTo(map);
          const popupHtml = `
            <div style="font-family: 'Instrument Sans', sans-serif; min-width: 160px;">
              <div style="font-family: 'Playfair Display', serif; font-weight: 800; font-size: 17px; line-height: 1.2;">${r.name.replace(/</g, "&lt;")}</div>
              ${r.comune ? `<div style="font-family: 'Playfair Display', serif; font-style: italic; font-size: 12px; color: #888; margin-top: 2px;">${r.comune.replace(/</g, "&lt;")}</div>` : ""}
              <div style="display: flex; align-items: center; gap: 8px; margin-top: 8px;">
                <span style="font-size: 10px; font-weight: 600; color: #888; background: #f0f0f0; padding: 2px 8px; border-radius: 99px;">${tipLabel(r.tipologia)}</span>
                <span style="font-weight: 700; font-size: 16px;">${a.toFixed(1)}</span>
              </div>
              <button data-review-id="${r.id}" class="map-popup-open" style="margin-top: 10px; width: 100%; padding: 7px; border: none; border-radius: 8px; background: #1a1a1a; color: #fff; font-family: inherit; font-size: 12px; font-weight: 600; cursor: pointer;">Apri scheda</button>
            </div>
          `;
          marker.bindPopup(popupHtml);
          bounds.push([r.lat, r.lng]);
        });

        // Fit bounds to all markers if any, otherwise stay on Italy
        if (bounds.length > 0) {
          setTimeout(() => {
            map.fitBounds(bounds, { padding: [40, 40], maxZoom: 13 });
            map.invalidateSize();
          }, 100);
        } else {
          setTimeout(() => map.invalidateSize(), 100);
        }

        // Wire up "Apri scheda" buttons inside popups via delegation
        const handlePopupClick = (e) => {
          const btn = e.target.closest(".map-popup-open");
          if (!btn) return;
          const id = btn.getAttribute("data-review-id");
          const r = reviews.find((x) => x.id === id);
          if (r) {
            setDetail(r);
            setView("detail");
          }
        };
        const container = listMapContainerRef.current;
        if (container) container.addEventListener("click", handlePopupClick);
        return () => {
          if (container) container.removeEventListener("click", handlePopupClick);
        };
      }, [view, reviews]);

      // Clean up main map when leaving map view
      useEffect(() => {
        if (view !== "map" && listMapRef.current) {
          listMapRef.current.remove();
          listMapRef.current = null;
        }
      }, [view]);

      // Build a read-only mini-map in the detail view
      useEffect(() => {
        if (view !== "detail" || !detail || detail.lat == null || detail.lng == null) return;
        if (!detailMapContainerRef.current) return;
        if (typeof L === "undefined") return;

        // Always recreate the map for the current detail (different review = different map)
        if (detailMapRef.current) {
          detailMapRef.current.remove();
          detailMapRef.current = null;
        }

        const map = L.map(detailMapContainerRef.current, {
          zoomControl: true,
          attributionControl: true,
          dragging: true,
          scrollWheelZoom: false,
        }).setView([detail.lat, detail.lng], 16);
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          attribution: "© OpenStreetMap",
          maxZoom: 19,
        }).addTo(map);
        L.marker(
          [detail.lat, detail.lng],
          { icon: makePinIcon(PIN_COLORS[detail.tipologia] || DEFAULT_PIN_COLOR) }
        ).addTo(map);
        detailMapRef.current = map;
        setTimeout(() => map.invalidateSize(), 100);
      }, [view, detail]);

      // Clean up detail map when leaving detail
      useEffect(() => {
        if (view !== "detail" && detailMapRef.current) {
          detailMapRef.current.remove();
          detailMapRef.current = null;
        }
      }, [view]);

      if (!loaded) return (
        <div style={{ display: "flex", justifyContent: "center", alignItems: "center", height: "100vh", fontFamily: "'Instrument Sans', sans-serif", color: "var(--text-light)", fontSize: 14 }}>
          Caricamento…
        </div>
      );

      const lbl = {
        display: "block",
        fontSize: 11,
        fontWeight: 600,
        color: "var(--text-ghost)",
        textTransform: "uppercase",
        letterSpacing: 0.8,
        marginBottom: 8,
      };

      // Rounded pill-style input
      const inp = {
        width: "100%",
        padding: "12px 20px",
        borderRadius: 99,
        border: "1.5px solid var(--border-strong)",
        background: "var(--surface)",
        fontSize: 15,
        color: "var(--text)",
        outline: "none",
        transition: "border-color 0.15s",
        fontFamily: "'Instrument Sans', sans-serif",
      };

      // Textarea needs softer corners but still rounded generously
      const textareaStyle = {
        width: "100%",
        padding: "14px 20px",
        borderRadius: 22,
        border: "1.5px solid var(--border-strong)",
        background: "var(--surface)",
        fontSize: 15,
        color: "var(--text)",
        outline: "none",
        transition: "border-color 0.15s",
        fontFamily: "'Instrument Sans', sans-serif",
        resize: "vertical",
        lineHeight: 1.5,
      };

      return (
        <div style={{
          maxWidth: 430,
          margin: "0 auto",
          minHeight: "100vh",
          background: "var(--bg)",
          fontFamily: "'Instrument Sans', sans-serif",
          color: "var(--text)",
          position: "relative",
        }}>
          {/* Hidden file input for import */}
          <input
            ref={fileInputRef}
            type="file"
            accept="application/json,.json"
            onChange={handleImportFile}
            style={{ display: "none" }}
          />

          {/* Header */}
          <div style={{
            padding: "20px 20px 14px",
            background: "var(--bg)",
            position: "sticky", top: 0, zIndex: 10,
            borderBottom: "1px solid var(--border)",
          }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              {view === "list" ? (
                <>
                  <div>
                    <h1 style={{
                      fontFamily: "'Playfair Display', serif",
                      fontSize: 36, fontWeight: 800, letterSpacing: -0.5, lineHeight: 1.1,
                      display: "flex", alignItems: "center", gap: 10,
                    }}>
                      <img
                        src="icons/cutlery-cream.png"
                        alt=""
                        className="logo-cutlery-cream"
                        style={{ height: 34, width: "auto", flexShrink: 0 }}
                      />
                      <img
                        src="icons/cutlery-dark.png"
                        alt=""
                        className="logo-cutlery-dark"
                        style={{ height: 34, width: "auto", flexShrink: 0 }}
                      />
                      Localini
                    </h1>
                    <span style={{ fontSize: 12, color: "var(--text-ghost)", fontWeight: 500 }}>
                      {reviews.length} {reviews.length === 1 ? "recensione" : "recensioni"}
                    </span>
                  </div>
                  <div style={{ display: "flex", gap: 8, alignItems: "center", position: "relative" }}>
                    {/* Map button */}
                    <button
                      onClick={() => setView("map")}
                      style={{
                        width: 40, height: 40, borderRadius: 99,
                        border: "1.5px solid var(--border-strong)", background: "var(--surface)", color: "var(--text)",
                        display: "flex", alignItems: "center", justifyContent: "center",
                        cursor: "pointer", WebkitTapHighlightColor: "transparent",
                      }}
                      aria-label="Mappa"
                    >
                      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">

                        overflow: "hidden",
                        border: "1px solid var(--border)",
                      }}
                    />
                  </div>
                )}

                <div style={{
                  marginTop: 22,
                  fontSize: 13,
                  color: "var(--text-lighter)",
                  textAlign: "center",
                }}>
                  {formattedDate}
                </div>

                {detail.note && (
                  <div style={{
                    background: "var(--surface-alt)", borderRadius: 22, padding: "14px 20px",
                    marginTop: 22, borderLeft: "3px solid var(--border-strong)",
                  }}>
                    <p style={{
                      margin: 0, fontSize: 19, lineHeight: 1.6,
                      color: "var(--text-muted)", fontStyle: "italic",
                      fontFamily: "'Playfair Display', serif",
                    }}>
                      {detail.note}
                    </p>
                  </div>
                )}

                <button
                  onClick={() => startEdit(detail)}
                  style={{
                    width: "100%", marginTop: 32, padding: "14px",
                    borderRadius: 99, border: "none",
                    background: "var(--accent)", color: "var(--accent-inverse)",
                    fontSize: 14, fontWeight: 600, cursor: "pointer",
                    WebkitTapHighlightColor: "transparent",
                  }}
                >
                  Modifica
                </button>

                <button
                  onClick={() => { if (confirm("Eliminare questa recensione?")) del(detail.id); }}
                  style={{
                    width: "100%", marginTop: 10, padding: "13px",
                    borderRadius: 99, border: "1.5px solid var(--border-strong)",
                    background: "transparent", color: "var(--danger)",
                    fontSize: 14, fontWeight: 600, cursor: "pointer",
                    WebkitTapHighlightColor: "transparent",
                  }}
                >
                  Elimina
                </button>
              </div>
            );
          })()}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
